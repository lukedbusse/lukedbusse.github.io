<!DOCTYPE html>
<html>
    <head>

        <title>Mad Lib</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

            <a href="index.html">Home</a>

        </div>
    <div id="welcomeScreen" style="text-align: center;">
        <h1>Mad Lib</h1>
        <p>
        Mad Libs is a popular phrasal template word game where one player prompts others for a list of words (nouns, verbs, adjectives, etc.) to fill in the blanks of a story, usually without seeing the context.
        </p>
        <button onclick="startQuiz()">Start Game</button>
    </div>
    <!-- QUIZ CONTENT (hidden at start) -->
    <div id="quizContainer" style="text-align: center; display: none;">
        <h2 id="question"></h2>
        <input id="answerInput" type="text" placeholder="Enter your answer">
        <br><br>
        <button id="submitBtn" onclick="checkAnswer()">Submit Word</button>
        <p id="feedback"></p>
    </div>
    <script>
        let answerData = ["adjective", "noun", "verb", "noun", "adjective", "noun", "verb"];
        let answerWord = [];
        let currentQuestion = 0;
        function loadQuestion() {
            if (currentQuestion < answerData.length) {
                let type = answerData[currentQuestion];
                document.getElementById("question").innerText = "Enter a/an " + type + ".";
                document.getElementById("answerInput").value = ""; // Clear input for next word
                document.getElementById("feedback").innerText = `Word ${currentQuestion + 1} of ${answerData.length}`;
            } else {
                showStory();
            }
        }
        function checkAnswer() {
            let userAnswer = document.getElementById("answerInput").value.trim();
            
            if (userAnswer === "") {
                document.getElementById("feedback").innerText = "Please enter a word!";
                return;
            }
            answerWord.push(userAnswer);
            currentQuestion++;
            loadQuestion();
        }
        function showStory() {
            let story = `Yesterday, I saw a <b>${answerWord[0]} ${answerWord[1]}</b> trying to 
                        <b>${answerWord[2]}</b> a giant <b>${answerWord[3]}</b>. 
                        It was so <b>${answerWord[4]}</b> that I accidentally dropped my 
                        <b>${answerWord[5]}</b> and started to <b>${answerWord[6]}</b>!`;
            let container = document.getElementById("quizContainer");
            container.innerHTML = `
                <h1>Your Funny Story</h1>
                <p style="font-size: 1.5rem; line-height: 1.6;">${story}</p>
                <br>
                <button onclick="location.reload()">Play Again</button>
            `;
        }
        function startQuiz() {
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("quizContainer").style.display = "block";
            loadQuestion();
        }
    </script>
    </body>

</html>
