<html>
<head>
    <title>Geography Quiz</title>
     <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="gallery.html">Photo Gallery</a>
        <a href="geoquiz.html" class="active">Geography Quiz</a>
    </div>
    <div id="welcomeScreen" style="text-align: center;">
        <h1>Geography Quiz</h1>
        <p>
        Test your knowledge of U.S. state capitals!
        You will be given a state, and your job is to type in its capital.
        </p>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>
    <div id="quizContainer" style="text-align: center; display: none;">
        <h2 id="question"></h2>
        <input id="answerInput" type="text" placeholder="Enter your answer" onkeydown="if(event.key==='Enter') checkAnswer()">
        <br><br>
        <button id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
        <p id="feedback"></p>
        <p id="score">Correct Answers: 0</p>
    </div>
    <script>
        let quizData = [
            {state: "Texas", capital: "Austin"}, 
            {state: "California", capital: "Sacramento"}, 
            {state: "New York", capital: "Albany"}, 
            {state: "Illinois", capital: "Springfield"}
        ];
        let currentQuestion = 0;
        let correctCount = 0;
        function loadQuestion(){
            let stateName = quizData[currentQuestion].state;
            document.getElementById("question").innerText = "What is the capital of " + stateName + "?"
            document.getElementById("feedback").innerText = ""; // Clear feedback for new question
        }
        function checkAnswer(){
            let correctAnswer = quizData[currentQuestion].capital;
            let userAnswer = document.getElementById("answerInput").value.trim();
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()){
                document.getElementById("feedback").style.color = "green";
                document.getElementById("feedback").innerText = "Correct!";
                correctCount++;
            } else {
                document.getElementById("feedback").style.color = "red";
                document.getElementById("feedback").innerText = "Incorrect. The correct answer is " + correctAnswer + ".";
            }
            document.getElementById("score").innerText = "Correct Answers: " + correctCount;
            document.getElementById("answerInput").value = "";
            currentQuestion++;
            if (currentQuestion < quizData.length){
                setTimeout(loadQuestion, 1500); 
            } else {
                finishQuiz();
            }
        }
        function startQuiz(){
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("quizContainer").style.display = "block";
            loadQuestion();
        }
        function finishQuiz(){
            document.getElementById("question").innerText = "Quiz Complete!";
            document.getElementById("answerInput").style.display = "none";
            document.getElementById("submitBtn").style.display = "none";
            document.getElementById("feedback").innerText = `Final Score: ${correctCount} out of ${quizData.length}`;
        }
    </script>
</body>
</html>
